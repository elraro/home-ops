---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app rajoybot
  namespace: telegram
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3

  values:
    controllers:
      main:
        replicas: 1
        strategy: RollingUpdate
        containers:
          main:
            image:
              repository: ghcr.io/elraro/rajoybot
              tag: latest
              pullPolicy: Always
            env:
              MYSQL_HOST: "localhost"
              MYSQL_PORT: "3306"
              TELEGRAM_BOT_TOKEN: "${SECRET_RAJOYBOT_TOKEN}"
              WEBHOOK_LISTEN: "0.0.0.0"
              WEBHOOK_LISTEN_PORT: "8080"
            envFrom:
              - secretRef:
                  name: rajoybot
            resources:
              requests:
                cpu: 15m
                memory: 105Mi
              limits:
                cpu: 30m
                memory: 150Mi

          mariadb-rajoybot:
            image:
              repository: mariadb
              tag: latest
              pullPolicy: IfNotPresent
            env:
              MYSQL_ROOT_PASSWORD:
                secretKeyRef:
                  name: rajoybot
                  key: mysqlrootpassword
              MYSQL_DATABASE:
                secretKeyRef:
                  name: rajoybot
                  key: mysqldatabase
              MYSQL_USER:
                secretKeyRef:
                  name: rajoybot
                  key: mysqluser
              MYSQL_PASSWORD:
                secretKeyRef:
                  name: rajoybot
                  key: mysqlpassword
            resources:
              requests:
                cpu: 15m
                memory: 105Mi
              limits:
                cpu: 30m
                memory: 150Mi

    service:
      main:
        controller: main
        ports:
          http:
            port: 8080
            protocol: TCP

    ingress:
      main:
        enabled: true
        className: external
        annotations:
          external-dns.alpha.kubernetes.io/target: "ipv4.${SECRET_DOMAIN}"
          external-dns/is-public: "true"
        hosts:
          - host: "botstelegram.${SECRET_DOMAIN}"
            paths:
              - path: "/${SECRET_RAJOYBOT_TOKEN}/"
                pathType: Prefix
        tls:
          - secretName: rajoybot-tls
            hosts:
              - "botstelegram.${SECRET_DOMAIN}"

    persistence:
      mariadb-volume:
        enabled: true
        type: hostPath
        hostPath: /home/elraro/home-ops/volumes/rajoybot/mariadb-rajoybot-volume
        globalMounts:
          - path: /var/lib/mysql

    defaultPodOptions:
      securityContext:
        runAsUser: 0
        runAsGroup: 0

    podAnnotations:
      kustomize.toolkit.fluxcd.io/substitute: "enabled"
