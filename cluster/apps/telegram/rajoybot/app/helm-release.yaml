---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app rajoybot
  namespace: telegram
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.6.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3

  values:
    controllers:
      main:
        replicas: 1
        strategy: RollingUpdate
        containers:
          main:
            image:
              repository: ghcr.io/elraro/rajoybot
              tag: latest@sha256:711803277245eca21846a53d34c8d6547ee745d972a138a232249bd5c2ebb49b
              pullPolicy: IfNotPresent
            env:
              TELEGRAM_BOT_TOKEN: "${SECRET_RAJOYBOT_TOKEN}"
              WEBHOOK_LISTEN: "0.0.0.0"
              WEBHOOK_LISTEN_PORT: "8080"
              TELEGRAM_USER_ALIAS: "elraro"
              SQLITE_FILE: /data/db.sqlite
              WEBHOOK_HOST: "botstelegram.${SECRET_DOMAIN}"
              WEBHOOK_PORT: 443
            resources:
              requests:
                cpu: 15m
                memory: 105Mi
              limits:
                cpu: 30m
                memory: 150Mi

    service:
      main:
        controller: main
        ports:
          http:
            port: 8080
            protocol: TCP

    ingress:
      main:
        enabled: true
        className: external
        annotations:
          external-dns.alpha.kubernetes.io/target: "ipv4.${SECRET_DOMAIN}"
          external-dns/is-public: "true"
        hosts:
          - host: "botstelegram.external.${SECRET_DOMAIN}"
            paths:
              - path: "/${SECRET_RAJOYBOT_TOKEN}/"
                pathType: Prefix
        tls:
          - secretName: rajoybot-tls
            hosts:
              - "botstelegram.external.${SECRET_DOMAIN}"

    persistence:
      rajoybot-volume:
        enabled: true
        type: hostPath
        hostPath: /home/elraro/home-ops/volumes/rajoybot/
        globalMounts:
          - path: /data/

    defaultPodOptions:
      securityContext:
        runAsUser: 0
        runAsGroup: 0

    podAnnotations:
      kustomize.toolkit.fluxcd.io/substitute: "enabled"
